<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="icoon.ico" type="image/x-icon">
    <link rel="stylesheet" href="Estilo.css">
    <title>Midias HTML5</title>
</head>
<body>
    <h1>Imagens Dinãmicas</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumenta ou diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png"> 
        <img src="imagens/foto-g.png" alt="foto-g">
    </picture>
    <h1>Reproduzindo audio</h1>
   <!-- <audio src="midia/Surf -midia.mp3" controls autoplay></audio>-->
   <audio preload="metadata" autoplay controls>
       <source src="midia/Surf -midia.mp3" type="audio/mpeg">
       <p>Infelizmente seu navegador não e consegue reporduzir áudio. <a href="midia/Surf -midia.mp3">Clique aqui para baixar o arquivo MP3</a></p>
   </audio>

    <script src="script.js"></script>
</body>

</html>
