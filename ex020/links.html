<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: darkred;
        }
        a:hover{
            color: black;
            text-decoration: underline;
        }
        a:active{
            color: chartreuse;
        }
        .especial::before{
            content: 	'☀ ';
            text-decoration: none;
            font-weight: normal;
            color: thistle;
        }
        .especial::after{
            content: ' ☼';
            text-decoration: none;
            font-weight: normal;
            color: tomato;
        }
        .especial{
            background-color: yellowgreen;
        }
        li{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/AndersonBR01" target="_blank" class="especial">Repositorio GitHub</a></li>
        <li><a href="https://www.youtube.com/channel/UCLCOn39xfl7OyfwiMwSvXRg" target="_blank">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site Do Cursoemvideo</a></li>


    </ul>
</body>
</html>
