<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Modelo de Caixas</title>
    <style>
        h1{
            background-color: red;
            height: 400px;
            width: 400px;
            /*border-width: 10px;

            border: 10px double silver;

            margin: 25px auto 50px auto;

        }

<body>
    <h1>Exemplo de caixa box-level</h1>
