<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="icoon.ico" type="image/x-icon">
    <link rel="stylesheet" href="estilo.css">
    <title>Videos Com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedado localmente</h1>
    <p>Este video está hospedado no meu proprio servidos.</p>
    <video width="500" poster="midia/imagens/icoon.ico" controls>
        <source src="midia/video/production-video.mp4" type="video/mp4">
        <source src="midia/video/Production-Video-1.m4v" type="video/mp4">
        <source src="midia/video/Production-Video-1.webm" type="video/webm">
        <p>Seu navegador não tem compatibilidade com reproduçoa de videos.</p>
    </video>

    <h1>Inserindo videos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/9CJIv5sEyig" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>



    <script src="script.js"></script>
</body>
</html>
